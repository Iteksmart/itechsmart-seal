name: Build → Push → Deploy

on:
  push:
    branches: [main]

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Derive service + image name
        id: image
        run: |
          SERVICE=$(echo "${{ github.event.repository.name }}" | sed 's/^itechsmart-//')
          echo "service=${SERVICE}" >> $GITHUB_OUTPUT
          echo "tag=itechsmart/${SERVICE}:latest" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.tag }}

      - name: Trigger deploy webhook
        run: |
          PAYLOAD=$(printf '{"service":"%s","image":"%s","sha":"%s"}' \
            "${{ steps.image.outputs.service }}" \
            "${{ steps.image.outputs.tag }}" \
            "${{ github.sha }}")
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "${{ secrets.WEBHOOK_SECRET }}" | awk '{print $2}')
          curl -sf -X POST https://hooks.itechsmart.dev/deploy \
            -H "Content-Type: application/json" \
            -H "X-Hub-Signature-256: sha256=${SIG}" \
            -d "$PAYLOAD"
