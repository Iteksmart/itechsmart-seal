name: Build & Deploy — itechsmart/seal

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  itechsmart/seal_NAME: itechsmart/seal

jobs:
  build-push-deploy:
    name: Build, Push, Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            itechsmart/seal:latest
            itechsmart/seal:sha-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Trigger deploy webhook
        env:
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          PAYLOAD=$(jq -cn             --arg service "itechsmart_seal"             --arg image "itechsmart/seal:latest"             --arg commit "${{ github.sha }}"             --arg actor "${{ github.actor }}"             '{service: $service, image: $image, commit_sha: $commit, actor: $actor}')
          SIG=$(printf '%s' "$PAYLOAD" | openssl dgst -sha256 -hmac "$WEBHOOK_SECRET" | awk '{print $2}')
          STATUS=$(curl -sf -o /tmp/wh.txt -w "%{http_code}"             -X POST "https://hooks.itechsmart.dev/hook"             -H "Content-Type: application/json"             -H "X-Hub-Signature-256: sha256=$SIG"             -d "$PAYLOAD")
          cat /tmp/wh.txt
          [ "$STATUS" = "200" ] || exit 1

      - name: Job summary
        if: always()
        run: |
          echo "## itechsmart/seal" >> $GITHUB_STEP_SUMMARY
          echo "| commit | ${{ github.sha }} |" >> $GITHUB_STEP_SUMMARY
          echo "| deploy service | itechsmart_seal |" >> $GITHUB_STEP_SUMMARY
